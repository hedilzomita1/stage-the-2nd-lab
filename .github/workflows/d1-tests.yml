name: d1-tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.lock) {
            python -m pip install -r requirements.lock
          } else {
            python -m pip install -r requirements.txt
          }

      - name: Preflight quick
        shell: pwsh
        run: |
          python scripts/preflight.py --quick

      - name: Run D1 tests with coverage gate
        shell: pwsh
        run: |
          python -m pytest -c pytest.ini tests_d1 --cov=src --cov=ui --cov-report=term-missing --cov-fail-under=20 -q

      - name: Run D3 quality gate
        shell: pwsh
        run: |
          python scripts/eval_d3.py --enforce-gate --min-micro-f1 0.65
